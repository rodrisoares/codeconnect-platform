# Alguns prefixos (/auth, /about) existem tanto na API quanto como rota do SPA.
# Numa navegação do navegador (full page load / refresh) o header Accept inclui
# "text/html": nesse caso servimos o index.html (SPA). Chamadas fetch/XHR
# (Accept != text/html) são encaminhadas para o backend. Mesma lógica do proxy
# do Vite em desenvolvimento (server.proxy + bypass).
map $http_accept $accept_html {
    default 0;
    "~*text/html" 1;
}

# O nome "backend" resolve pelo DNS interno do docker-compose.
upstream backend {
    server backend:3000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Permite upload de imagens (multipart) sem estourar o limite padrão.
    client_max_body_size 20m;

    # Cabeçalhos de proxy herdados por todas as locations que fazem proxy_pass.
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ---- Prefixos que são API E rota do SPA (decide pelo Accept) ----
    location /auth {
        if ($accept_html) { rewrite ^ /index.html last; }
        proxy_pass http://backend;
    }
    location /about {
        if ($accept_html) { rewrite ^ /index.html last; }
        proxy_pass http://backend;
    }

    # ---- Prefixos exclusivos da API ----
    location /blog-posts   { proxy_pass http://backend; }
    location /comments     { proxy_pass http://backend; }
    location /users        { proxy_pass http://backend; }
    location /bookmarks    { proxy_pass http://backend; }
    location /notifications { proxy_pass http://backend; }
    location /uploads      { proxy_pass http://backend; }

    # Swagger (Nest publica a UI em /api e o JSON em /api-json).
    location /api          { proxy_pass http://backend; }

    # ---- SPA: qualquer outra rota cai no index.html ----
    location / {
        try_files $uri $uri/ /index.html;
    }
}
